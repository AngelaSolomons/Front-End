<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <title>contact page</title>
</head>

<body class="bg-black text-light d-flex flex-column min-vh-100 pt-5">
    <div class="header bg-black">
        <div class="container-fluid gx-0">


            <!-- Navbar Start-->
            <nav class="navbar navbar-expand-lg navbar-dark bg-black fixed-top py-1">
                <div class="container" data-aos="zoom-in">
                    <a class="navbar-brand text-warning fw-bold fs-3 logo" href="./index.html">OrangeTech</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto text-light">
                            <li class="nav-item"><a class="nav-link text-light fw-semibold p-3" aria-current="page" href="./index.html">Home</a></li>
                            <li class="nav-item"><a class="nav-link text-light fw-semibold p-3" href="./about.html">About</a></li>
                            <li class="nav-item"><a class="nav-link text-light fw-semibold p-3" href="./products.html">Products</a></li>
                            <li class="nav-item"><a class="nav-link active text-light fw-semibold p-3" href="./contact.html">Contact</a></li>
                            <li class="nav-item d-flex align-items-center ms-2"><a href="#" class="nav-link text-warning fs-4"><i class="bi bi-cart3"></i></a></li>
                        </ul>
                    </div>
                </div>
            </nav>
            <!-- Navbar End -->


            <!-- Form Start -->
            <div class="container py-5 mt-5 bg-black">
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="card bg-black border-warning shadow-lg">
                            <div class="card-body p-5">
                                <h1 class="text-warning fw-bold mb-4 text-center">Contact Us</h1>
                                <form>
                                    <div class="mb-3">
                                        <label class="form-label text-light">Full Name</label>
                                        <input type="text" placeholder="Jerry John" class="form-control bg-black text-light border-warning">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-light">Email Address</label>
                                        <input type="email" placeholder="example@gmail.com" class="form-control bg-black text-light border-warning">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-light">Message</label>
                                        <textarea rows="5" class="form-control bg-black text-light border-warning" placeholder="Enter your message"></textarea>
                                    </div>
                                    <button class="btn btn-warning fw-bold w-100">Send Message</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Form End -->


            <!-- Footer Start -->
            <footer class="bg-black border-top border-warning py-4 mt-auto">
                <div class="container text-center">
                    <h5 class="text-warning fw-bold">OrangeTech</h5>
                    <p class="text-light mb-1">Curated orange tech accessories.</p>
                    <small class="text-secondary">© 2026 OrangeTech. All rights reserved.</small>
                </div>
            </footer>
            <!-- Footer End -->


            <!-- Script file -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>


            <!-- AOS Start-->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>AOS.init();</script>
            <!-- AOS End -->


</body>
</html>
