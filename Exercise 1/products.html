<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Cards</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<!-- Header Section -->
<header class="header">
    <h1>The Yarn Shop</h1>
</header>

<!-- Product Cards Section -->
<main class="container">

    <div class="card">
        <img src="https://i.ibb.co/ZzwDTRt7/pexels-knit-pro-86420210-8971884.jpg" alt="Crochet set image">
        <h2>Crochet Set</h2>
        <p class="price">R100</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://i.ibb.co/78SYWyj/pexels-castorlystock-3639038.jpg" alt="Crochet hook image">
        <h2>Crochet Hook</h2>
        <p class="price">R20</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://i.ibb.co/qMsvgYt6/Basix-Birch-Circular.jpg" alt="Knitting needles image">
        <h2>Knitting Needles</h2>
        <p class="price">R30</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://i.ibb.co/FLQ0mWYy/Untitled-design.png" alt="Sewing supplies image">
        <h2>Sewing Supplies</h2>
        <p class="price">R20 - R250</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://i.ibb.co/XfhnmxBh/pexels-armandvalendez-15026564.jpg" alt="Pink yarn image">
        <h2>Pink Yarn</h2>
        <p class="price">R35</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://i.ibb.co/JwmPNr8y/pexels-castorlystock-3693218.jpg" alt="Teal yarn image">
        <h2>Teal Yarn</h2>
        <p class="price">R35</p>
        <button>Add to Cart</button>
    </div>

</main> 

<footer class="footer">
    <p>&copy; 2026 The Yarn Shop</p>
</footer>

</body>
</html>
